name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Run unit and golden master tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Upload ApprovalTests received files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: approvaltests-received
          path: |
            src/test/cpp/approval_tests/*.received.txt
            src/test/cpp/golden_master/*.received.txt
          if-no-files-found: ignore
